name: nuclearledger
description: "A personal bookkeeping mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Networking
  dio: ^5.7.0

  # Local storage
  shared_preferences: ^2.3.4

  # Charts
  fl_chart: ^0.69.2

  # Date & number formatting
  intl: ^0.19.0

  # Calendar widget
  table_calendar: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  test: any
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
